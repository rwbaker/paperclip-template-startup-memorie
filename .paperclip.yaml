schema: paperclip/v1

# LLM adapters, one per agent. Filled in Tasks 4-8.
agents:
  gm:
    adapter:
      type: claude
      model: claude-opus-4-8
  business-strategist:
    adapter:
      type: claude
      model: claude-opus-4-8
  cmo:
    adapter:
      type: claude
      model: claude-opus-4-8
  growth-marketer:
    adapter:
      type: claude
      model: claude-sonnet-5
  seo-blog-lead:
    adapter:
      type: claude
      model: claude-sonnet-5
  lifecycle-marketer:
    adapter:
      type: claude
      model: claude-sonnet-5
  partnerships-pr:
    adapter:
      type: claude
      model: claude-sonnet-5
  paid-media-strategist:
    adapter:
      type: claude
      model: claude-opus-4-8
  content-producer:
    adapter:
      type: claude
      model: claude-sonnet-5
    inputs:
      env:
        ZERNIO_API_KEY:
          kind: secret
          requirement: required
  brand-designer:
    adapter:
      type: claude
      model: claude-sonnet-5
  web-engineer:
    adapter:
      type: claude
      model: claude-sonnet-5
  analyst:
    adapter:
      type: claude
      model: claude-opus-4-8
    inputs:
      env:
        ZERNIO_API_KEY:
          kind: secret
          requirement: required
        LOOPS_API_KEY:
          kind: secret
          requirement: required
  support:
    adapter:
      type: claude
      model: claude-sonnet-5
  librarian:
    adapter:
      type: claude
      model: claude-sonnet-5
    inputs:
      env:
        DASHBOARD_API_URL:
          kind: string
          requirement: optional
          default: ""
        DASHBOARD_API_KEY:
          kind: secret
          requirement: optional

# Heartbeat routines (scheduled operations). Filled in Task 10.
routines:
  gm-daily-light-check:
    agent: gm
    triggers:
      - cronExpression: "0 7 * * *"
        timezone: America/New_York
  gm-weekly-digest:
    agent: gm
    triggers:
      - cronExpression: "0 8 * * 1"
        timezone: America/New_York
  strategist-weekly-scan:
    agent: business-strategist
    triggers:
      - cronExpression: "0 9 * * 2"
        timezone: America/New_York
  cmo-weekly-coordination:
    agent: cmo
    triggers:
      - cronExpression: "0 9 * * 1"
        timezone: America/New_York
  growth-marketer-daily:
    agent: growth-marketer
    triggers:
      - cronExpression: "30 6 * * *"
        timezone: America/New_York
  seo-blog-weekly:
    agent: seo-blog-lead
    triggers:
      - cronExpression: "0 9 * * 3"
        timezone: America/New_York
  lifecycle-weekly:
    agent: lifecycle-marketer
    triggers:
      - cronExpression: "0 9 * * 4"
        timezone: America/New_York
  partnerships-weekly:
    agent: partnerships-pr
    triggers:
      - cronExpression: "0 9 * * 5"
        timezone: America/New_York
  content-producer-am:
    agent: content-producer
    triggers:
      - cronExpression: "0 10 * * *"
        timezone: America/New_York
  content-producer-pm:
    agent: content-producer
    triggers:
      - cronExpression: "0 16 * * *"
        timezone: America/New_York
  web-weekly-hygiene:
    agent: web-engineer
    triggers:
      - cronExpression: "0 10 * * 3"
        timezone: America/New_York
  analyst-daily-health:
    agent: analyst
    triggers:
      - cronExpression: "0 6 * * *"
        timezone: America/New_York
  analyst-weekly-metrics:
    agent: analyst
    triggers:
      - cronExpression: "0 7 * * 1"
        timezone: America/New_York
  analyst-monthly-voc:
    agent: analyst
    triggers:
      - cronExpression: "0 9 1 * *"
        timezone: America/New_York
  librarian-daily:
    agent: librarian
    triggers:
      - cronExpression: "0 20 * * *"
        timezone: America/New_York
  librarian-monthly-audit:
    agent: librarian
    triggers:
      - cronExpression: "0 9 2 * *"
        timezone: America/New_York
  support-daily-sweep:
    agent: support
    triggers:
      - cronExpression: "0 12 * * *"
        timezone: America/New_York

# Human approval gates. Filled in Task 11.
approval_policies: {}
