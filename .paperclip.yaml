schema: paperclip/v1

# Per-agent runtime config. Paperclip schedules agents via heartbeats
# (runtimeConfig.schedule.intervalSec) — each agent's AGENTS.md tells it what
# is due when it wakes. There are NO cron routines in the import format.
# If your Paperclip version ignores these blocks on import, apply the same
# values post-import (see README "After import").
agents:
  ceo:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-8
    runtimeConfig:
      schedule: { enabled: true, intervalSec: 3600, maxConcurrentRuns: 1 }
    inputs:
      env:
        DASHBOARD_API_URL:
          kind: string
          requirement: optional
          default: ""
        DASHBOARD_API_KEY:
          kind: secret
          requirement: optional
  business-strategist:
